<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>锦亚桃花会 | 跨游戏精英公会</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root {
            /* 主题色变量，方便后期维护 */
            --bg-dark: #0a0f1e;
            --bg-gradient: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            --primary-pink: #ffb7c5;
            --accent-pink: #ff708d;
            --text-main: #eef5ff;
            --text-dim: #cbd5ff;
            --glass-bg: rgba(20, 28, 40, 0.7);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 基础样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            background: var(--bg-gradient);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 滚动条优化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e2a3a; }
        ::-webkit-scrollbar-thumb { background: var(--primary-pink); border-radius: 10px; }

        /* Canvas 背景容器 */
        #petalCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 2;
        }

        /* 动画定义 */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            到 { opacity: 1; transform: translateY(0); }
        }

        /* 头部样式 */
        header.hero {
            text-align: center;
            padding: 5rem 1rem;
            animation: fadeUp 0.8s ease;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6F0, var(--primary-pink), #C084FC, #60A5FA);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(255,183,197,0.3));
        }

        .sub-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 0.4rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 游戏战场版块 */
        .section-title {
            text-align: center;
            margin: 4rem 0 2rem;
            font-size: 2rem;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 183, 197, 0.2);
            border-radius: 24px;
            padding: 2.5rem;
            transition: var(--transition);
            text-align: center;
        }

        。game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-pink);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        。game-card i { font-size: 3rem; margin-bottom: 1.5rem; color: var(--primary-pink); }

        /* 部门网格 */
        .dept-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .dept-item {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid var(--accent-pink);
            transition: var(--transition);
        }

        .dept-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }

        /* 转化版块 */
        。join-card {
            background: linear-gradient(135deg, rgba(255,112,141,0.1), rgba(96,165,250,0.1));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 3rem;
            text-align: center;
            margin: 5rem 0;
        }

        .qq-box {
            background: #000;
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.5rem;
            font-family: monospace;
            margin: 1.5rem 0;
            border: 1px solid var(--primary-pink);
        }

        .btn-copy {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        。btn-copy:active { transform: scale(0.95); }

        footer {
            text-align: center;
            padding: 3rem 0;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            opacity: 0.6;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .dept-grid { grid-template-columns: 1fr 1fr; }
            .join-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="petalCanvas"></canvas>

    <div class="container">
        <header class="hero">
            <h1>❀ 锦亚桃花会 ❀</h1>
            <div class="sub-tag">北风萧萧 · 桃花御北</div>
            <p style="margin-top: 1.5rem; color: var(--text-dim);">
                无论你来自哪个游戏世界，这里都是温暖的家。
            </p>
        </header>

        <main>
            <section class="game-section">
                <h2 class="section-title">核心战场</h2>
                <div class="game-grid">
                    <article class="game-card">
                        <i class="fas fa-cubes" aria-hidden="true"></i>
                        <h3>我的世界</h3>
                        <p>无限创造，红石科技，史诗建筑。</p>
                    </article>
                    <article class="game-card">
                        <i class="fas fa-tank" aria-hidden="true"></i>
                        <h3>铁锈战争</h3>
                        <p>钢铁洪流，指挥千军万马的即时战略。</p>
                    </article>
                    <article class="game-card">
                        <i class="fas fa-rocket" aria-hidden="true"></i>
                        <h3>星际猎人</h3>
                        <p>跨越光年，书写属于你的银河史诗。</p>
                    </article>
                </div>
            </section>

            <section style="margin: 4rem 0;">
                <h2 class="section-title">公会部门</h2>
                <div class="dept-grid">
                    <div class="dept-item"><i class="fas fa-city" aria-hidden="true"></i> 茶北锦建集团</div>
                    <div class="dept-item"><i class="fas fa-shield-alt" aria-hidden="true"></i> 御北卫戍集团</div>
                    <div class="dept-item"><i class="fas fa-bomb" aria-hidden="true"></i> 锈锋火力集团</div>
                    <div class="dept-item"><i class="fas fa-gavel" aria-hidden="true"></i> 检察部</div>
                    <div class="dept-item"><i class="fas fa-handshake" aria-hidden="true"></i> 联合部</div>
                    <div class="dept-item"><i class="fas fa-chart-line" aria-hidden="true"></i> 规划部</div>
                    <div class="dept-item"><i class="fas fa-dove" aria-hidden="true"></i> 自由玩家协会</div>
                    <div class="dept-item"><i class="fas fa-database" aria-hidden="true"></i> 信息部</div>
                </div>
            </section>

            <section class="join-card">
                <h2>立即加入我们</h2>
                <p>点击下方复制群号，开启你的传奇之旅</p>
                <div class="qq-box" id="qqNum">1030191253</div>
                <br>
                <button class="btn-copy" onclick="copyQQ()">复制 QQ 群号</button>
                
                <div style="margin-top: 2rem;">
                    <a href="https://space.bilibili.com/3546576387574104" target="_blank" rel="noopener noreferrer" style="color: white; font-size: 1.5rem; margin: 0 10px;">
                        <i class="fab fa-bilibili"></i>
                    </a>
                    <p style="font-size: 0.8rem; margin-top: 10px; opacity: 0.7;">全网同名：锦亚桃花会</p>
                </div>
            </section>
        </main>

        <footer>
            <p>© 锦亚桃花会 · 跨游戏精英社区</p>
        </footer>
    </div>

    <script>
        /**
         * 1. 优化后的 Canvas 桃花粒子动画
         * 相比 DOM 动画，Canvas 渲染效率提升约 10 倍
         */
        const canvas = document.getElementById('petalCanvas');
        const ctx = canvas.getContext('2d');
        let petals = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Petal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 5 + 5;
                this.speed = Math.random() * 1 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size/2, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#ffb7c5aa';
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y / 50);
                this.angle += this.spin;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
        }

        for (let i = 0; i < 50; i++) {
            petals.push(new Petal());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        /**
         * 2. 安全的剪贴板复制功能
         * 兼容 HTTP 和 HTTPS 环境
         */
        function copyQQ() {
            const qq = document.getElementById('qqNum').innerText;
            const btn = document.querySelector('.btn-copy');

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(qq).键，然后(showSuccess).catch(fallbackCopy);
            } else {
                fallbackCopy(qq);
            }

            function showSuccess() {
                const originalText = btn.innerText;
                btn.innerText = "已复制到剪贴板！";
                btn.style.background = "#4CAF50";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "";
                }, 2000);
            }

            function fallbackCopy() {
                const textArea = document.createElement("textarea");
                textArea.value = qq;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showSuccess();
                } catch (err) {
                    alert('请手动复制: ' + qq);
                }
                document.body.removeChild(textArea);
            }
        }
    </script>
</body>
</html>
